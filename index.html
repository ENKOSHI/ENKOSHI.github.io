<html>

        <body>
            <div class="container">
                <h1> 背默检测</h1>
                <div class=" box">
                    <tag><div id="question"> 点击“刷新”以获取题目</div></tag>
                    <input type="text" id="answerInput" placeholder="请输入答案">
                </div>
                <div class=" box">
                    <button onclick="checkAnswer()"> 提交答案</button>
                    <button onclick="startGame()">刷新</button>
                    <p>题库投稿yuansswl@163.com</p>
                    <a href="https://github.com/ENKOSHI/ENKOSHI.github.io">view origin</a>
                    <div class=" box">
                        <script>
                            const questions = [
{question: '在《＜论语＞十二章》中，孔子用"文"和"质"对"君子"下了定义的句子是：', answer: '文质彬彬，然后君子'},
{question: '荀子的《劝学》中，以雕刻为喻，正面强调学习必须持之以恒的句子是：', answer: '锲而不舍，金石可镂'},
{question: '李煜的《虞美人》中，“________”两句通过写故国建筑和当年宫女，传达出物是人非之感。', answer: '雕栏玉砌应犹在，只是朱颜改'},
{question: '苏轼的《念奴娇·赤壁怀古》中，以“________”写周瑜的儒将装扮；用“________”表现出曹军惨败的情景。', answer: '羽扇纶巾，樯橹灰飞烟灭'},
{question: '曹操的《短歌行》中，引用《诗经》写姑娘思念情人的诗句，来比喻渴望得到贤才的句子是：', answer: '青青子衿，悠悠我心'},
{question: '《赤壁赋》中，侧面描写，表现了洞箫之声的凄切婉转，堪称神来之笔：', answer: '舞幽壑之潜蛟，泣孤舟之嫠妇'},
{question: '李商隐的诗句"身无彩凤双飞翼，心有灵犀一点通"中"心有灵犀一点通"表达了身不能共处，心意却能相通的意思。白居易《琵琶行》中与此意思接近的两句是：', answer: '同是天涯沦落人，相逢何必曾相识'},
{question: '《过秦论》中，描写陈涉起义所使用的武器与秦国相比的句子是：', answer: '锄耰棘矜，非铦于钩戟长铩也' },
{question: '《过秦论》中，描写陈涉起义所使用的武器与秦国相比的句子是', answer: '锄懮棘矜,非铦于钩戟长铩也'},
{question: '《蜀道难》中借鸟儿月夜悲啼和沙洲飞旋的画面衬托蜀道之难的句子是', answer: '又闻子规啼夜月，愁空山'},
{question: '《登高》中描绘无边落木和不尽长江的句子是', answer: '无边落木萧萧下，不尽长江滚滚来'},
{question: '《念奴娇·赤壁怀古》中表达祭奠之意的句子是', answer: '一尊还酹江月'},
{question: '《赤壁赋》中表达欢聚之意的句子是', answer: '举匏樽以相属'},
{question: '《送东阳马生序》中只表示保暖之意的句子是', answer: '以衾拥覆'},
{question: '《茅屋为秋风所破歌》中写出布被又旧又破的句子是', answer: '布衾多年冷似铁'},
{question: '《白雪歌送武判官归京》中选取人物居住、睡眠、穿衣等生活场景表现对“胡天八月”特殊感受的句子是', answer: '散入珠帘湿罗幕，狐裘不暖锦衾薄'},
{question: '《论语·为政》中指出成为教师条件的句子是', answer: '温故而知新，可以为师矣'},
{question: '《师说》中点出李蟠文章爱好的句子是', answer: '好古文'},
{question: '《师说》中说明李蟠儒学素养的句子是', answer: '六艺经传皆通习之'},
{question: '《念奴娇（大江东去）》中写周瑜儒将装束的句子是', answer: '羽扇纶巾'},
{question: '《念奴娇（大江东去）》中表明周瑜赫赫战功的句子是', answer: '樯橹灰飞烟灭'},
{question: '《离骚》中反映古代服饰“上衣下裳制”的句子是', answer: '制芰荷以为衣兮，集芙蓉以为裳'},
{question: '元代戏剧家马致远的杂剧《青衫泪》的题目是根据白居易的诗《琵琶行》中的“________，________”改编而成', answer: '座中泣下谁最多，江州司马青衫湿'},
{question: '《水调歌头（明月几时有）》中苏轼自言想要重返天上但又有所顾虑的原因的句子是', answer: '又恐琼楼玉宇，高处不胜寒'},
{question: '《庄子·逍遥游》中说去百里之外需做的准备是', answer: '宿舂粮'},
{question: '《庄子·逍遥游》中说去千里之外需做的准备是', answer: '三月聚粮'},
{question: '《邹忌讽齐王纳谏》中邹忌认定自己不如徐公美的句子是', answer: '窥镜而自视，又弗如远甚'},
{question: '《伶官传序》中感慨李存勖强盛时的句子是', answer: '其意气之盛，可谓壮哉'},
{question: '《归园田居》（其一）中采用对仗句式，连用两个比喻，表达诗人对官场厌倦以及对田园向往的句子是', answer: '羁鸟恋旧林，池鱼思故渊'},
{question: '《琵琶行》中对乐曲演奏过程中的停顿进行情感表达说明的诗句是', answer: '别有幽愁暗恨生，此时无声胜有声'},
{question: '《虞美人》（春花秋月何时了）中想到当年金陵宫殿慨叹物是人非的句子是', answer: '雕栏玉砌应犹在，只是朱颜改'},
{question: '《岳阳楼记》中描写春日洞庭湖景色写到花草的句子是', answer: '岸芷汀兰，郁郁青青'},
{question: '《左传·庄公十年》中曹刿确认齐军不是伪装败退进而决定追击的原因的句子是', answer: '(吾)视其辙乱，望其旗靡'},
{question: '《庄子·逍遥游》中大鹏迁往南海时的情形的句子是', answer: '水击三千里，抟扶摇而上者九万里'},
{question: '《三峡》一文中引用渔歌印证前文对哀猿长啸描写的句子是', answer: '巴东三峡巫峡长，猿鸣三声泪沾裳'},
{question: '《荀子·劝学》中以劣马的执着为喻强调为学必须持之以恒的句子是', answer: '驽马十驾，功在不舍'},
{question: '《诗经·周南·关雎》中写到乐器的句子是', answer: '琴瑟友之；钟鼓乐之'},
{question: '《琵琶行》中写琵琶女以娴熟技艺演奏当时有名两首乐曲的句子是', answer: '轻拢慢捻抹复挑，初为《霓裳》后《六幺》'},
{question: '《锦瑟》中引发后世读者多种解读的数目字所在的两句诗是', answer: '锦瑟无端五十弦，一弦一柱思华年'},
{question: '《己亥杂诗》（其五）中以花落归根为喻抒发诗人虽辞官但仍关心国家前途命运情怀的句子是', answer: '落红不是无情物，化作春泥更护花'},
{question: '《诗经·卫风·氓》中对男女主人公小时候欢乐相处描写的句子是', answer: '总角之宴，言笑晏晏'},
{question: '《登高》中使用叠字从听觉、视觉上突出对景伤怀感受的两句诗是', answer: '无边落木萧萧下，不尽长江滚滚来'},
{question: '《永遇乐·京口北固亭怀古》中表现当年刘裕率军北伐时强大气势的两句诗是', answer: '金戈铁马，气吞万里如虎'},
{question: '《邹忌讽齐王纳谏》中描写一开始很多人进谏的情形的句子是', answer: '门庭若市'},
{question: '《邹忌讽齐王纳谏》中描写齐王接受邹忌意见，过了几个月后进谏的情形的句子是', answer: '时时而间进'},
{question: '《行路难》中描诗人内心郁闷，茶饭不思的两句诗是', answer: '停杯投箸不能食，拔剑四顾心茫然'},
{question: '《报任安书》中说自己编写《史记》的状态及遭遇李陵之祸后的态度的句子是', answer: '草创未就，就极刑而无愠色'},
{question: '《李凭箜篌引》中说明竖箜篌弦数另一种可能的两句诗是', answer: '十二门前融冷光，二十三丝动紫皇'},
{question: '《五代史伶官传序》中李存勖用兵作战时的情形的句子是', answer: '则遣从事以一少牢告庙，请其矢'},
{question: '《临安春雨初霁》中看似闲适恬静实则透露出诗人惆怅而彻夜难眠的两句诗是', answer: '小楼一夜听春雨，深巷明朝卖杏花'},

                            ];

                            let currentQuestion = {
                            }

                                ;

                            function getRandomQuestion() {
                                const randomIndex = Math.floor(Math.random() * questions.length);
                                return questions[randomIndex];
                            }

                            function startGame() {
                                currentQuestion = getRandomQuestion();
                                document.getElementById('question').textContent = currentQuestion.question;
                                document.getElementById('answerInput').value = '';
                            }

                            function checkAnswer() {
                                const userAnswer = document.getElementById('answerInput').value;
                                if (userAnswer === currentQuestion.answer) {
                                    alert('回答正确!');
                                    startGame();
                                }

                                else {
                                    alert(`回答错误！正确答案是 ${currentQuestion.answer}`);
                                }

                            }
                        </script>
                    </div>
                </div>
        </div>
</body >
</html>
