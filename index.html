<!DOCTYPE html>
<html>
<head>
    <title>高中语文理解性默写</title>
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url(https://ENKOSHI.github.io/Background.jpg);
            background-size: cover;
        }

        .container {
            opacity: 0.50;
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        h1 {
            opacity: 0.60;
            text-align: center;
            color: indianred;
            font-weight: 900;
        }

        .box {
            background-color: whitesmoke;
            max-width: 600px;
            width: 75%;
            height: auto;
            text-align: center;
            margin: 20px auto;
            opacity: 0.80;
            border-radius: 10px;
            padding: 20px;
        }

        p {
            color: indianred;
            font-weight: 500;
        }

        a {
            color: indianred;
            font-weight: 900;
        }

        tag {
            color: indianred;
            font-weight: 800;
        }

        input[type="text"] {
            opacity: 0.60;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-weight: 600;
            color: indianred;
        }

        button {
            background-color: indianred;
            opacity: 0.80;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }

            button:hover {
                background-color: indianred;
                opacity: 0.60;
            }

    </style>
        </head>
        <body>
            <div class="container">
                <h1> 背默检测</h1>
                <div class=" box">
                    <tag><div id="question"> 点击“刷新”以获取题目</div></tag>
                    <input type="text" id="answerInput" placeholder="请输入答案">
                </div>
                <div class=" box">
                    <button onclick="checkAnswer()"> 提交答案</button>
                    <button onclick="startGame()">刷新</button>
                    <p>题库投稿yuansswl@163.com</p>
                    <a href="https://github.com/ENKOSHI/ENKOSHI.github.io">view origin</a>
                    <div class=" box">
                        <script>
                            const questions = [{
                                question: '在《＜论语＞十二章》中，孔子用"文"和"质"对"君子"下了定义的句子是：', answer: '文质彬彬，然后君子'
                            }
                                ,
                            {
                                question: '荀子的《劝学》中，以雕刻为喻，正面强调学习必须持之以恒的句子是：', answer: '锲而不舍，金石可镂'
                            }
                                ,
                            {
                                question: '李煜的《虞美人》中，“________”两句通过写故国建筑和当年宫女，传达出物是人非之感。', answer: '雕栏玉砌应犹在，只是朱颜改'
                            }
                                ,
                            {
                                question: '苏轼的《念奴娇·赤壁怀古》中，以“________”写周瑜的儒将装扮；用“________”表现出曹军惨败的情景。', answer: '羽扇纶巾，樯橹灰飞烟灭'
                            }
                                ,
                            {
                                question: '曹操的《短歌行》中，引用《诗经》写姑娘思念情人的诗句，来比喻渴望得到贤才的句子是：', answer: '青青子衿，悠悠我心'
                            }
                                ,
                            {
                                question: '《赤壁赋》中，侧面描写，表现了洞箫之声的凄切婉转，堪称神来之笔：', answer: '舞幽壑之潜蛟，泣孤舟之嫠妇'
                            }
                                ,
                            {
                                question: '李商隐的诗句"身无彩凤双飞翼，心有灵犀一点通"中"心有灵犀一点通"表达了身不能共处，心意却能相通的意思。白居易《琵琶行》中与此意思接近的两句是：', answer: '同是天涯沦落人，相逢何必曾相识'
                            }
                                ,
                            {
                                question: '《过秦论》中，描写陈涉起义所使用的武器与秦国相比的句子是：', answer: '锄耰棘矜，非铦于钩戟长铩也'
                            }

                            ];

                            let currentQuestion = {
                            }

                                ;

                            function getRandomQuestion() {
                                const randomIndex = Math.floor(Math.random() * questions.length);
                                return questions[randomIndex];
                            }

                            function startGame() {
                                currentQuestion = getRandomQuestion();
                                document.getElementById('question').textContent = currentQuestion.question;
                                document.getElementById('answerInput').value = '';
                            }

                            function checkAnswer() {
                                const userAnswer = document.getElementById('answerInput').value;
                                if (userAnswer === currentQuestion.answer) {
                                    alert('回答正确!');
                                    startGame();
                                }

                                else {
                                    alert(`回答错误！正确答案是 ${currentQuestion.answer}`);
                                }

                            }
                        </script>
                    </div>
                </div>
        </div>
</body >
</html>
